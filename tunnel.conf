# ================================================================
# NEXUS AI — Tunnel Configuration
# ================================================================
# File này cấu hình tunnel để có URL public cố định.
# Bỏ comment 1 trong 3 phương án dưới đây.
# ================================================================

# ─────────────────────────────────────────────────────────────
# Phương án 1: QUICK TUNNEL (mặc định — URL ĐỔI mỗi lần chạy)
# ─────────────────────────────────────────────────────────────
# Không cần cấu hình gì. Mỗi lần chạy script sẽ tạo URL random.
# Ví dụ: https://random-words-123.trycloudflare.com
# TUNNEL_MODE=quick

# ─────────────────────────────────────────────────────────────
# Phương án 2: CLOUDFLARE NAMED TUNNEL (URL CỐ ĐỊNH — miễn phí)
# ─────────────────────────────────────────────────────────────
# Yêu cầu:
#   1. Tài khoản Cloudflare (free) — đăng ký tại https://dash.cloudflare.com
#   2. Một domain đã thêm vào Cloudflare (free domain hoặc domain rẻ $1-2/năm)
#
# Cài đặt (chỉ làm 1 lần):
#   1. Chạy: cloudflared tunnel login (mở browser, chọn domain)
#   2. Chạy: cloudflared tunnel create nexus-ai
#   3. Chạy: cloudflared tunnel route dns nexus-ai nexus-ai.yourdomain.com
#      (thay yourdomain.com bằng domain thật của bạn)
#
# Sau đó đổi TUNNEL_MODE và điền thông tin:
# TUNNEL_MODE=cloudflare-named
# TUNNEL_NAME=nexus-ai
# TUNNEL_URL=https://nexus-ai.yourdomain.com

# ─────────────────────────────────────────────────────────────
# Phương án 3: NGROK (URL CỐ ĐỊNH — miễn phí, dễ nhất)
# ─────────────────────────────────────────────────────────────
# Yêu cầu:
#   1. Tài khoản ngrok (free) — đăng ký tại https://ngrok.com (login GitHub)
#   2. Lấy authtoken tại https://dashboard.ngrok.com/get-started/your-authtoken
#   3. Lấy free static domain tại https://dashboard.ngrok.com/domains
#      (ngrok free tier cho 1 domain cố định, ví dụ: nexus-ai.ngrok-free.app)
#   4. Cài ngrok: https://ngrok.com/download
#   5. Chạy: ngrok config add-authtoken YOUR_TOKEN
#
# Sau đó đổi TUNNEL_MODE và điền domain:
TUNNEL_MODE=ngrok
NGROK_DOMAIN=clavicle-justify-qualm.ngrok-free.dev
