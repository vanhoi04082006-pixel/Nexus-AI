# ====== NEXUS AI App — fly.toml ======
# Fly.io config cho Next.js app (port 3000)

app = "nexus-ai-app"
primary_region = "sin" # Singapore — gần Việt Nam nhất

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  DATABASE_URL = "file:/data/custom.db"
  # Chat service URL (app khác trên Fly)
  CHAT_SERVICE_URL = "http://nexus-ai-chat.internal:3001"

# HTTP service
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false # Không sleep — pipeline background cần chạy liên tục
  auto_start_machines = true
  min_machines_running = 1   # Luôn chạy ít nhất 1 machine

# Volume persistent cho SQLite database
[[mounts]]
  source = "nexus_data"
  destination = "/data"
  initial_size = "1GB"

# Machine config — free tier: 256MB RAM, shared CPU
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb" # Tăng từ 256mb mặc định để AI pipeline không OOM

# Scale — 1 machine cho free tier
[[scale]]
  min = 1
  max = 1
