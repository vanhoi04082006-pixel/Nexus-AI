# ====== NEXUS AI Chat Service — fly.toml ======
# Fly.io config cho Socket.io chat service (port 3001)

app = "nexus-ai-chat"
primary_region = "sin" # Cùng region với app

[build]
  dockerfile = "Dockerfile.chat"

[env]
  PORT = "3001"
  NODE_ENV = "production"
  # URL của Next.js app (để verify token khi join chat)
  NEXT_APP_URL = "http://nexus-ai-app.internal:3000"

# HTTP service — Socket.io cần WebSocket
[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false # Không sleep — WebSocket cần persistent
  auto_start_machines = true
  min_machines_running = 1

# Machine config
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb" # Chat service nhẹ hơn app

[[scale]]
  min = 1
  max = 1
